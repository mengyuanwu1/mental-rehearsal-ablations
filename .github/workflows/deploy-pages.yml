name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify assignments
        run: npm run verify:assignments

      - name: Build
        run: npm run build
        env:
          VITE_RESPONSE_ENDPOINT: https://script.google.com/macros/s/AKfycbyzubtQJynbAVZKcpYjuJX7WnL537ta1ZGN1P6-goFLQgXvmQDuEgP8MJq1EpI0zcHVcQ/exec
          VITE_RESPONSE_SECRET: 0745883be03f97f21881350af135185b7cafd1f49320e3306e3727fc7c0bccc9
          VITE_STUDY_ID: mental-rehearsal-ablation-v1

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
