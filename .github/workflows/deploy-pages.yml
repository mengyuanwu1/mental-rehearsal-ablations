name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify assignments
        run: npm run verify:assignments

      - name: Build
        run: npm run build
        env:
          VITE_RESPONSE_ENDPOINT: https://script.google.com/macros/s/AKfycbz88gnCKToBD2MvEy1jSzx33OWg4wgeU3wQ2rOTsOkczzdxnuStpydgb3MRGXOgdfw/exec
          VITE_RESPONSE_SECRET: 6e5080ee019452f3275167dbd230593744baed57d6cea68b
          VITE_STUDY_ID: mental-rehearsal-ablation-v1

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
